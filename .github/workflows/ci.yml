name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: knit
          POSTGRES_PASSWORD: knit
          POSTGRES_DB: knit_test
        ports:
          - 5432:5432
        # Wait until Postgres is ready before the job runs.
        options: >-
          --health-cmd "pg_isready -U knit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Exercises the store integration tests (acceptance #1) against a real DB.
      KNIT_TEST_DB_URL: postgres://knit:knit@localhost:5432/knit_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

  build:
    name: Build (CGO_ENABLED=0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Acceptance #7: the binary must build statically with CGO disabled.
      - name: Build
        env:
          CGO_ENABLED: "0"
        run: go build -o knit .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
